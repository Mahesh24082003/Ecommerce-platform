stages:
  - install
  - build
  - test

variables:
  NODE_VERSION: "20.x"

# Backend installation
backend-install:
  stage: install
  image: node:${NODE_VERSION}
  cache:
    key: backend-node-modules
    paths:
      - backend/node_modules/
  script:
    - cd backend
    - npm ci --prefer-offline --no-audit
  artifacts:
    paths:
      - backend/node_modules/
    expire_in: 1 hour

# Frontend installation
frontend-install:
  stage: install
  image: node:${NODE_VERSION}
  cache:
    key: frontend-node-modules
    paths:
      - frontend/node_modules/
  script:
    - cd frontend
    - npm ci --prefer-offline --no-audit
  artifacts:
    paths:
      - frontend/node_modules/
    expire_in: 1 hour

# Backend build/validation
backend-build:
  stage: build
  image: node:${NODE_VERSION}
  dependencies:
    - backend-install
  script:
    - cd backend
    - echo "Checking backend syntax..."
    - node --check server.js || exit 1
    - node --check app.js || exit 1
    - echo "Backend syntax validation passed"
  needs:
    - backend-install

# Frontend build
frontend-build:
  stage: build
  image: node:${NODE_VERSION}
  dependencies:
    - frontend-install
  script:
    - cd frontend
    - npm run build -- --configuration production
  artifacts:
    paths:
      - frontend/dist/
    expire_in: 1 week
  needs:
    - frontend-install

# Frontend tests
frontend-test:
  stage: test
  image: node:${NODE_VERSION}
  dependencies:
    - frontend-install
  script:
    - cd frontend
    - npm run test -- --run --browsers=ChromeHeadless || echo "Tests completed with warnings"
  needs:
    - frontend-install
  allow_failure: true
